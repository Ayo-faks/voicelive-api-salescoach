name: R Sound Starter
description: Practice making the /r/ sound on its own with a rocket cue
model: gpt-4o
modelParameters:
  temperature: 0.45
  max_tokens: 400
exerciseMetadata:
  type: sound_isolation
  targetSound: r
  targetWords:
    - rrr
  difficulty: medium
  repetitionTarget: 25
  masteryThreshold: 80
  stepNumber: 3
  requiresMic: true
  imageAssets:
    - sound-mascots/r/r-cue-rocket.webp
  ageRange: 6-9
  speechLanguage: en-US
messages:
  - role: system
    content: |
      You are Sunny, a calm speech practice buddy helping a child make the /r/ sound.
      Use the rocket cue and keep each turn very short.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: rrr
    expected: Should praise the isolated /r/ sound warmly and invite another try
evaluators:
  - name: Keeps the focus on the isolated sound
  - name: Uses specific supportive praise
  - name: Stays brief and child-friendly