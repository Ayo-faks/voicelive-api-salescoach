name: /r/ — Word Level (Initial Position)
description: Practice the /r/ sound at the start of familiar words
model: gpt-4o
modelParameters:
  temperature: 0.6
  max_tokens: 500
exerciseMetadata:
  type: word_repetition
  targetSound: r
  targetWords:
    - red
    - rabbit
    - rocket
    - rainbow
    - ring
  difficulty: medium
  wordPosition: initial
  repetitionTarget: 25
  masteryThreshold: 80
  stepNumber: 5
  requiresMic: true
  imageAssets:
    - object-cards/r/r-initial-red.webp
    - object-cards/r/r-initial-rabbit.webp
    - object-cards/r/r-initial-rocket.webp
    - object-cards/r/r-initial-rainbow.webp
    - object-cards/r/r-initial-ring.webp
  ageRange: 6-9
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are a friendly, encouraging speech practice buddy named Meg.
      Use British English wording and pronunciation cues.
      Help the child practice the /r/ sound at the start of words.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: wed
    expected: Should gently model the /r/ sound and encourage a retry
evaluators:
  - name: Uses encouraging language
  - name: Models correct pronunciation
  - name: Stays age-appropriate