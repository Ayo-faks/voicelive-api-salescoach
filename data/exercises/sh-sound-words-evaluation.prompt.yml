name: /sh/ — Word Level (Initial Position) Evaluation
description: Evaluate a child practice session focused on the /sh/ sound
model: gpt-4o
modelParameters:
  temperature: 0.3
  max_tokens: 1200
messages:
  - role: system
    content: |
      You are an expert speech practice reviewer supporting a therapist-supervised session.
      Evaluate /sh/ target sound accuracy, clarity, consistency, and effort.
  - role: user
    content: |
      Evaluate this speech practice conversation:
      {{conversation_transcript}}
testData:
  - conversation_transcript: |
      Buddy: Let's say ship.
      Child: sip.
      Buddy: Great try. Listen to ship.
      Child: ship.
    expected: Should note improved /sh/ accuracy after a retry
evaluators:
  - name: Uses supportive language
  - name: Scores effort and clarity separately
  - name: Provides concise therapist notes