name: Listen for R or W Evaluation
description: Evaluate listening discrimination between /r/ and /w/
model: gpt-4o
modelParameters:
  temperature: 0.3
  max_tokens: 1000
messages:
  - role: system
    content: |
      You are an expert reviewer for therapist-supervised speech sound practice.
      Evaluate whether the activity stays focused on hearing the /r/ versus /w/ contrast before production.
  - role: user
    content: |
      Evaluate this speech practice conversation:
      {{conversation_transcript}}
testData:
  - conversation_transcript: |
      Buddy: Listen for ring or wing.
      Child: ring.
      Buddy: Yes, you heard ring.
    expected: Should note clear contrastive listening and concise feedback
evaluators:
  - name: Checks R versus W discrimination
  - name: Rewards accurate listening choices
  - name: Keeps therapist notes concise