name: /sh/ — Auditory Bombardment
description: Twelve shell-sound pictures play automatically while the child listens.
model: gpt-4o
modelParameters:
  temperature: 0.2
  max_tokens: 120
exerciseMetadata:
  type: auditory_bombardment
  targetSound: sh
  targetWords:
    - ship
    - shell
    - shark
    - shoe
    - sheep
    - shop
    - shed
    - shirt
    - shower
    - brush
    - dish
    - fish
  difficulty: easy
  repetitionTarget: 20
  masteryThreshold: null
  stepNumber: 0
  requiresMic: false
  durationSeconds: 90
  imageAssets:
    - object-cards/sh/sh-initial-ship-card.webp
    - object-cards/sh/sh-initial-shell.webp
    - object-cards/sh/sh-initial-shark.webp
    - object-cards/sh/sh-initial-shoe.webp
    - object-cards/sh/sh-initial-sheep.webp
    - object-cards/sh/sh-initial-shop.webp
    - object-cards/sh/sh-initial-shed.webp
    - object-cards/sh/sh-initial-shirt.webp
    - object-cards/sh/sh-initial-shower.webp
    - object-cards/sh/sh-final-brush.webp
    - object-cards/sh/sh-final-dish.webp
    - object-cards/sh/sh-final-fish.webp
  ageRange: 5-8
  speechLanguage: en-GB
  exemplars:
    - word: ship
      imageAssetId: sh-initial-ship-card
      audioSource: tts
      position: initial
    - word: shell
      imageAssetId: sh-initial-shell
      audioSource: tts
      position: initial
    - word: shark
      imageAssetId: sh-initial-shark
      audioSource: tts
      position: initial
    - word: shoe
      imageAssetId: sh-initial-shoe
      audioSource: tts
      position: initial
    - word: sheep
      imageAssetId: sh-initial-sheep
      audioSource: tts
      position: initial
    - word: shop
      imageAssetId: sh-initial-shop
      audioSource: tts
      position: initial
    - word: shed
      imageAssetId: sh-initial-shed
      audioSource: tts
      position: initial
    - word: shirt
      imageAssetId: sh-initial-shirt
      audioSource: tts
      position: initial
    - word: shower
      imageAssetId: sh-initial-shower
      audioSource: tts
      position: initial
    - word: brush
      imageAssetId: sh-final-brush
      audioSource: tts
      position: final
    - word: dish
      imageAssetId: sh-final-dish
      audioSource: tts
      position: final
    - word: fish
      imageAssetId: sh-final-fish
      audioSource: tts
      position: final
messages:
  - role: system
    content: |
      You are Meg, a calm speech practice buddy. This is a listening-only Stage 0 activity: the app plays twelve shell-sound picture words automatically.
      Stay silent during the run. If the child speaks, reply with one short warm sentence and let the pictures keep going.
      Never say the letter names. If you must name the sound, use the percept label "shhh".
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: I can hear the pictures
    expected: Warm one-sentence acknowledgement, no instruction to repeat
evaluators:
  - name: Stays quiet and warm during listening
  - name: Never spells out letter names
  - name: Uses the shhh percept label when naming the sound
