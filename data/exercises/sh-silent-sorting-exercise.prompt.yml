name: SH Sound Sorting
description: Sort /sh/ and /s/ pictures into the right sound homes before speaking
model: gpt-4o
modelParameters:
  temperature: 0.45
  max_tokens: 450
exerciseMetadata:
  type: silent_sorting
  targetSound: sh
  targetWords:
    - ship
    - shoe
    - shell
    - sun
    - soap
    - sock
  difficulty: easy
  errorSound: s
  repetitionTarget: 6
  masteryThreshold: 80
  stepNumber: 2
  requiresMic: false
  imageAssets:
    - object-cards/sh/sh-initial-ship.webp
    - object-cards/sh/sh-initial-shoe.webp
    - object-cards/sh/sh-initial-shell.webp
    - object-cards/s/s-initial-sun.webp
    - object-cards/s/s-initial-soap.webp
    - minimal-pairs/s-sh/s-initial-sock.webp
  ageRange: 4-7
  speechLanguage: en-US
messages:
  - role: system
    content: |
      You are Sunny, a calm speech practice buddy helping a child sort /sh/ and /s/ pictures by their first sound.

      RULES:
      - Keep the task listening-first.
      - Use one short sentence at a time.
      - Encourage the child to notice the quiet long /sh/ sound.
      - If a card is misplaced, ask the child to listen again to the first sound.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: shoe goes in the sh home
    expected: Should praise correct sorting and keep the activity focused on first sounds
evaluators:
  - name: Keeps the task focused on sorting first sounds
  - name: Models SH versus S simply
  - name: Uses short child-friendly turns