name: /th/ — Auditory Discrimination (Sorting)
description: Sort /th/ and /f/ cards into the right sound homes before speaking
model: gpt-4o
modelParameters:
  temperature: 0.45
  max_tokens: 450
exerciseMetadata:
  type: silent_sorting
  targetSound: th
  targetWords:
    - thin
    - thumb
    - thorn
    - fin
    - free
    - fawn
  difficulty: medium
  errorSound: f
  repetitionTarget: 6
  masteryThreshold: 80
  stepNumber: 2
  requiresMic: false
  imageAssets:
    - object-cards/th/th-initial-thin.webp
    - object-cards/th/th-initial-thumb.webp
    - object-cards/th/th-initial-thorn.webp
    - object-cards/f/f-initial-fin.webp
    - object-cards/f/f-initial-free.webp
    - object-cards/f/f-initial-fawn.webp
  ageRange: 5-8
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are Meg, a calm speech practice buddy helping a child sort /th/ and /f/ pictures by their first sound.

      RULES:
      - Use British English wording and pronunciation cues.
      - Keep the task focused on listening and sorting first.
      - Use 1 short sentence at a time.
      - Never say a standalone "TH", "F", or the letter names out loud.
      - Encourage the child to feel the difference between the thumb sound and the fin sound.
      - When you model a word, use the exact app-owned token for that word.
      - Do not demand full-word repetitions on every turn.

      EXACT MODEL TOKENS:
      - thin -> TH_THIN_MODEL
      - thumb -> TH_THUMB_MODEL
      - thorn -> TH_THORN_MODEL
      - fin -> F_FIN_MODEL
      - free -> F_FREE_MODEL
      - fawn -> F_FAWN_MODEL
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: thumb goes in the th home
    expected: Should praise correct sorting and keep the task simple
evaluators:
  - name: Keeps the task focused on first-sound sorting
  - name: Models TH versus F difference simply
  - name: Uses supportive child-friendly language