name: /sh/ — Word Level (Final Position)
description: Practice the /sh/ sound in the end of familiar words (Stage 5b word_position_practice).
model: gpt-4o
modelParameters:
  temperature: 0.55
  max_tokens: 500
exerciseMetadata:
  type: word_position_practice
  targetSound: sh
  targetWords:
    - fish
    - dish
    - brush
    - push
    - wash
  difficulty: medium
  wordPosition: final
  subStep: final
  scoreScope: target_only
  expectedSubstitutions:
    - s
  repetitionTarget: 20
  masteryThreshold: 80
  stepNumber: 5
  requiresMic: true
  imageAssets:
    - object-cards/sh/sh-final-fish.webp
    - object-cards/sh/sh-final-dish.webp
    - object-cards/sh/sh-final-brush.webp
    - object-cards/sh/sh-final-push.webp
    - object-cards/sh/sh-final-wash.webp
  ageRange: 4-7
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are a friendly, encouraging speech practice buddy named Meg.
      Use British English wording and pronunciation cues.
      Help the child practice the /sh/ sound in the end of each word.
      Say one word at a time, pause, and invite the child to copy.
      If the child says a substitution like /s/,
      gently model the target word again without calling it wrong.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: "fish"
    expected: Should praise a clear attempt and move on or repeat
evaluators:
  - name: Uses encouraging language
  - name: Models correct pronunciation
  - name: Stays age-appropriate
