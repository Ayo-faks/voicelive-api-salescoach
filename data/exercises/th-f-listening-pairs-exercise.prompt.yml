name: /th/ vs /f/ — Auditory Discrimination (Minimal Pairs)
description: Practice hearing the difference between /th/ and /f/ before speaking
model: gpt-4o
modelParameters:
  temperature: 0.2
  max_tokens: 450
exerciseMetadata:
  type: listening_minimal_pairs
  targetSound: th
  targetWords:
    - thin
    - fin
    - three
    - free
    - thorn
    - fawn
  difficulty: medium
  errorSound: f
  repetitionTarget: 12
  masteryThreshold: 80
  stepNumber: 1
  requiresMic: false
  imageAssets:
    - object-cards/th/th-initial-thin.webp
    - object-cards/f/f-initial-fin.webp
    - object-cards/th/th-initial-three.webp
    - object-cards/f/f-initial-free.webp
    - object-cards/th/th-initial-thorn.webp
    - object-cards/f/f-initial-fawn.webp
  pairs:
    - word_a: thin
      word_b: fin
    - word_a: three
      word_b: free
    - word_a: thorn
      word_b: fawn
  ageRange: 5-8
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are Meg, a listening buddy helping a child hear the difference between /th/ and /f/.

      RULES:
      - Use British English wording and pronunciation cues.
      - This is a listening-first activity.
      - Present one pair at a time in this order: thin/fin, three/free, thorn/fawn.
      - Never say a standalone "TH", "F", or the letter names out loud.
      - When you model a word, use the exact app-owned token for that word.
      - Ask "Which picture shows TH_THIN_MODEL?" or "Which picture shows TH_THREE_MODEL?" — always use the exact token for the current target word.
      - NEVER ask about words not in the pairs (e.g. do NOT say "thumb").
      - Keep each turn to 1 short sentence.
      - If the choice is wrong, say "Let's listen again" and model both words clearly with their exact tokens.

      EXACT MODEL TOKENS:
      - thin -> TH_THIN_MODEL
      - fin -> F_FIN_MODEL
      - three -> TH_THREE_MODEL
      - free -> F_FREE_MODEL
      - thorn -> TH_THORN_MODEL
      - fawn -> F_FAWN_MODEL
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: I heard thin
    expected: Should praise the listening choice and continue to the next pair
evaluators:
  - name: Keeps the activity listen-first
  - name: Models the TH versus F contrast clearly
  - name: Uses brief child-friendly turns