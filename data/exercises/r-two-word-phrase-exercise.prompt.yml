name: /r/ — Phrase Level
description: Practice the /r/ sound inside short two-word phrases (Stage 6 two_word_phrase).
model: gpt-4o
modelParameters:
  temperature: 0.55
  max_tokens: 500
exerciseMetadata:
  type: two_word_phrase
  targetSound: r
  targetWords:
    - rain
    - rock
    - rope
    - ring
    - rabbit
    - rainbow
  difficulty: medium
  phraseFrame: adj_noun
  phrases:
    - phraseText: "cold rain"
      targetWord: rain
      carrierWord: cold
      targetPosition: initial
      imageAssetId: phrase-cards/r/r-phrase-rain.webp
      audioSource: tts
    - phraseText: "big rock"
      targetWord: rock
      carrierWord: big
      targetPosition: initial
      imageAssetId: phrase-cards/r/r-phrase-rock.webp
      audioSource: tts
    - phraseText: "long rope"
      targetWord: rope
      carrierWord: long
      targetPosition: initial
      imageAssetId: phrase-cards/r/r-phrase-rope.webp
      audioSource: tts
    - phraseText: "gold ring"
      targetWord: ring
      carrierWord: gold
      targetPosition: initial
      imageAssetId: phrase-cards/r/r-phrase-ring.webp
      audioSource: tts
    - phraseText: "white rabbit"
      targetWord: rabbit
      carrierWord: white
      targetPosition: initial
      imageAssetId: phrase-cards/r/r-phrase-rabbit.webp
      audioSource: tts
    - phraseText: "my rainbow"
      targetWord: rainbow
      carrierWord: my
      targetPosition: initial
      imageAssetId: phrase-cards/r/r-phrase-rainbow.webp
      audioSource: tts
  expectedSubstitutions:
    - w
    - uh
  repetitionTarget: 18
  masteryThreshold: 80
  stepNumber: 6
  requiresMic: true
  imageAssets:
    - phrase-cards/r/r-phrase-rain.webp
    - phrase-cards/r/r-phrase-rock.webp
    - phrase-cards/r/r-phrase-rope.webp
    - phrase-cards/r/r-phrase-ring.webp
    - phrase-cards/r/r-phrase-rabbit.webp
    - phrase-cards/r/r-phrase-rainbow.webp
  ageRange: 5-8
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are a friendly, encouraging speech practice buddy named Meg.
      Use British English wording and pronunciation cues.
      Help the child practice the /r/ sound inside a short two-word phrase.
      Model the phrase once, pause, and invite the child to copy the whole phrase.
      If the child produces a substitution, gently model the target word again
      without calling it wrong.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: "cold rain"
    expected: Should praise a clear phrase-level attempt and move on or repeat
evaluators:
  - name: Uses encouraging language
  - name: Models correct pronunciation of the target word inside the phrase
  - name: Stays age-appropriate
