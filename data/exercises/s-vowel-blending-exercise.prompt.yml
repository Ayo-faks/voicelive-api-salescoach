name: S Vowel Blending
description: Blend /s/ with easy vowels before moving to full words
model: gpt-4o
modelParameters:
  temperature: 0.5
  max_tokens: 450
exerciseMetadata:
  type: vowel_blending
  targetSound: s
  targetWords:
    - see
    - sigh
    - sew
    - sue
  difficulty: easy
  repetitionTarget: 12
  masteryThreshold: 80
  stepNumber: 4
  requiresMic: true
  imageAssets:
    - sound-mascots/s/s-cue-snake.webp
  ageRange: 4-7
  speechLanguage: en-US
messages:
  - role: system
    content: |
      You are Sunny, a warm speech practice buddy helping a child glide from /s/ into vowels.

      RULES:
      - Keep each turn to 1 short sentence.
      - Model the sound first, then the blend.
      - Use phrases like "sss...ee becomes see".
      - Praise smooth blending, not just volume.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: see
    expected: Should praise the smooth /s/ blend and offer another vowel blend
evaluators:
  - name: Focuses on blending rather than full conversation
  - name: Models smooth transitions clearly
  - name: Stays short and encouraging