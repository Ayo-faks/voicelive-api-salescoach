name: /f/ — Auditory Bombardment
description: Twelve fin-sound pictures play automatically while the child listens.
model: gpt-4o
modelParameters:
  temperature: 0.2
  max_tokens: 120
exerciseMetadata:
  type: auditory_bombardment
  targetSound: f
  targetWords:
    - fin
    - fawn
    - fox
    - fan
    - feet
    - fish
    - fire
    - foot
    - four
    - leaf
    - roof
    - wolf
  difficulty: easy
  repetitionTarget: 20
  masteryThreshold: null
  stepNumber: 0
  requiresMic: false
  durationSeconds: 90
  imageAssets:
    - object-cards/f/f-initial-fin.webp
    - object-cards/f/f-initial-fawn.webp
    - object-cards/f/f-initial-fox.webp
    - object-cards/f/f-initial-fan.webp
    - object-cards/f/f-initial-feet.webp
    - object-cards/f/f-initial-fish.webp
    - object-cards/f/f-initial-fire.webp
    - object-cards/f/f-initial-foot.webp
    - object-cards/f/f-initial-four.webp
    - object-cards/f/f-final-leaf.webp
    - object-cards/f/f-final-roof.webp
    - object-cards/f/f-final-wolf.webp
  ageRange: 5-8
  speechLanguage: en-GB
  exemplars:
    - word: fin
      imageAssetId: f-initial-fin
      audioSource: tts
      position: initial
    - word: fawn
      imageAssetId: f-initial-fawn
      audioSource: tts
      position: initial
    - word: fox
      imageAssetId: f-initial-fox
      audioSource: tts
      position: initial
    - word: fan
      imageAssetId: f-initial-fan
      audioSource: tts
      position: initial
    - word: feet
      imageAssetId: f-initial-feet
      audioSource: tts
      position: initial
    - word: fish
      imageAssetId: f-initial-fish
      audioSource: tts
      position: initial
    - word: fire
      imageAssetId: f-initial-fire
      audioSource: tts
      position: initial
    - word: foot
      imageAssetId: f-initial-foot
      audioSource: tts
      position: initial
    - word: four
      imageAssetId: f-initial-four
      audioSource: tts
      position: initial
    - word: leaf
      imageAssetId: f-final-leaf
      audioSource: tts
      position: final
    - word: roof
      imageAssetId: f-final-roof
      audioSource: tts
      position: final
    - word: wolf
      imageAssetId: f-final-wolf
      audioSource: tts
      position: final
messages:
  - role: system
    content: |
      You are Meg, a calm speech practice buddy. This is a listening-only Stage 0 activity: the app plays twelve fin-sound picture words automatically.
      Stay silent during the run. If the child speaks, reply with one short warm sentence and let the pictures keep going.
      Never say the letter names. If you must name the sound, use the percept label "fff".
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: I can hear the pictures
    expected: Warm one-sentence acknowledgement, no instruction to repeat
evaluators:
  - name: Stays quiet and warm during listening
  - name: Never spells out letter names
  - name: Uses the fff percept label when naming the sound
