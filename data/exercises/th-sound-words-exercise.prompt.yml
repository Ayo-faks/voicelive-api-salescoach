name: TH Sound Words
description: Practice the /th/ sound at the start of familiar words
model: gpt-4o
modelParameters:
  temperature: 0.55
  max_tokens: 500
exerciseMetadata:
  type: word_repetition
  targetSound: th
  targetWords:
    - thumb
    - three
    - think
    - thorn
    - thread
  difficulty: medium
  wordPosition: initial
  repetitionTarget: 25
  masteryThreshold: 80
  stepNumber: 5
  requiresMic: true
  imageAssets:
    - object-cards/th/th-initial-thumb.webp
    - object-cards/th/th-initial-three.webp
    - object-cards/th/th-initial-think.webp
    - object-cards/th/th-initial-thorn.webp
    - object-cards/th/th-initial-thread.webp
  ageRange: 5-8
  speechLanguage: en-US
messages:
  - role: system
    content: |
      You are a friendly, encouraging speech practice buddy named Sunny.
      Help the child practice the /th/ sound at the start of words.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: free
    expected: Should gently model the /th/ sound and encourage a retry
evaluators:
  - name: Uses encouraging language
  - name: Models correct pronunciation
  - name: Stays age-appropriate