name: /f/ — Conversation Level
description: Open-ended structured conversation eliciting /f/ tokens (Stage 8 structured_conversation).
model: gpt-4o
modelParameters:
  temperature: 0.7
  max_tokens: 600
exerciseMetadata:
  type: structured_conversation
  targetSound: f
  targetWords:
    - farm
    - feather
    - fence
    - fern
    - find
    - fish
    - five
    - food
    - forest
    - four
    - fox
    - friend
  difficulty: medium
  topics:
    - topicId: f-farm
      title: "On the farm"
      imageAssetId: topic-cards/f/f-topic-farm.webp
      openPrompts:
        - "What animals live on a farm?"
        - "Tell me about a farm you've seen."
        - "What do farmers do every day?"
      targetBiasedPrompts:
        - "Can you see any fish or a fox nearby?"
        - "What's on your favourite food plate?"
        - "Do you have five feet or four?"
      suggestedTargetWords:
        - farm
        - fish
        - fox
        - food
        - five
        - four
        - feather
        - fence
    - topicId: f-forest
      title: "In the forest"
      imageAssetId: topic-cards/f/f-topic-forest.webp
      openPrompts:
        - "What might you find in a forest?"
        - "Tell me about a time you went walking in the trees."
        - "What sounds would you hear there?"
      targetBiasedPrompts:
        - "Can you spot a fern or a feather?"
        - "What would you put in your picnic for a forest trip?"
        - "Would you follow a fox or a friend?"
      suggestedTargetWords:
        - forest
        - fern
        - feather
        - fox
        - four
        - friend
        - find
        - food
  expectedSubstitutions:
    - p
    - b
  targetCountGate: 15
  durationFloorSeconds: 120
  durationCeilingSeconds: 300
  repairPolicy: recast_and_query_and_expansion
  scaffoldEscalation:
    windowSeconds: 45
    minTokensInWindow: 3
    cooldownSeconds: 60
  repetitionTarget: 20
  masteryThreshold: 80
  stepNumber: 8
  requiresMic: true
  imageAssets:
    - topic-cards/f/f-topic-farm.webp
    - topic-cards/f/f-topic-forest.webp
  ageRange: 5-8
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are a warm, curious conversation partner named Meg helping a child
      practise natural talk that contains the /f/ sound.
      Use British English wording and pronunciation cues.

      - Let the child pick a topic card and lead the conversation.
      - Ask short, open questions that invite more than one word back.
      - If the child's /f/ tokens are frequent and on-target, stay open-ended.
      - If the child produces a substitution, recast naturally (model the
        target without calling it wrong). Never correct directly.
      - When scaffold escalation is signalled, use the target-biased prompts
        for the current topic to gently increase /f/ opportunities.
      - Keep every turn to 1-2 short sentences.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: "I like the farm."
    expected: Should recast naturally and ask an open follow-up
evaluators:
  - name: Maintains natural conversation
  - name: Uses recast rather than direct correction
  - name: Respects scaffold escalation signals
