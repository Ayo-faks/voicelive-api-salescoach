name: /s/ structured conversation
description: Open-ended structured conversation eliciting /s/ tokens (Stage 8 structured_conversation).
model: gpt-4o
modelParameters:
  temperature: 0.7
  max_tokens: 600
exerciseMetadata:
  type: structured_conversation
  targetSound: s
  targetWords:
    - Saturn
    - safe
    - sail
    - sand
    - say
    - sea
    - seal
    - see
    - seven
    - sock
    - soup
    - space
    - star
    - suit
    - sun
  difficulty: medium
  topics:
    - topicId: s-seaside
      title: "At the seaside"
      imageAssetId: topic-cards/s/s-topic-seaside.webp
      openPrompts:
        - "What do you do at the seaside?"
        - "Tell me about a holiday near the sea."
        - "What's your favourite thing on the sand?"
      targetBiasedPrompts:
        - "Do you play with sand or swim in the sea?"
        - "Can you see a seal or a starfish?"
        - "Is the sun hot or soft today?"
      suggestedTargetWords:
        - sea
        - sand
        - sun
        - seal
        - sock
        - sail
        - soup
        - say
    - topicId: s-space
      title: "In space"
      imageAssetId: topic-cards/s/s-topic-space.webp
      openPrompts:
        - "What would you pack for a trip to space?"
        - "Tell me about the stars."
        - "Have you ever looked through a telescope?"
      targetBiasedPrompts:
        - "Can you see seven stars from your spaceship?"
        - "Would you sit on Saturn or the sun?"
        - "Does your suit keep you safe in space?"
      suggestedTargetWords:
        - space
        - star
        - sun
        - Saturn
        - suit
        - safe
        - seven
        - see
  expectedSubstitutions:
    - th
    - t
  targetCountGate: 15
  durationFloorSeconds: 120
  durationCeilingSeconds: 300
  repairPolicy: recast_and_query_and_expansion
  scaffoldEscalation:
    windowSeconds: 45
    minTokensInWindow: 3
    cooldownSeconds: 60
  repetitionTarget: 20
  masteryThreshold: 80
  stepNumber: 8
  requiresMic: true
  imageAssets:
    - topic-cards/s/s-topic-seaside.webp
    - topic-cards/s/s-topic-space.webp
  ageRange: 5-8
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are a warm, curious conversation partner named Meg helping a child
      practise natural talk that contains the /s/ sound.
      Use British English wording and pronunciation cues.

      - Let the child pick a topic card and lead the conversation.
      - Ask short, open questions that invite more than one word back.
      - If the child's /s/ tokens are frequent and on-target, stay open-ended.
      - If the child produces a substitution, recast naturally (model the
        target without calling it wrong). Never correct directly.
      - When scaffold escalation is signalled, use the target-biased prompts
        for the current topic to gently increase /s/ opportunities.
      - Keep every turn to 1-2 short sentences.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: "I like the farm."
    expected: Should recast naturally and ask an open follow-up
evaluators:
  - name: Maintains natural conversation
  - name: Uses recast rather than direct correction
  - name: Respects scaffold escalation signals
