name: R Vowel Blending Evaluation
description: Evaluate /r/ plus vowel blending practice
model: gpt-4o
modelParameters:
  temperature: 0.3
  max_tokens: 1000
messages:
  - role: system
    content: |
      You are an expert reviewer for therapist-supervised speech sound practice.
      Evaluate whether the buddy models smooth /r/ to vowel blending, detects /w/ substitutions when present, and keeps the task focused.
  - role: user
    content: |
      Evaluate this speech practice conversation:
      {{conversation_transcript}}
testData:
  - conversation_transcript: |
      Buddy: r...ee becomes ree.
      Child: ree.
      Buddy: Nice strong R sound.
    expected: Should note clear R blend modelling and supportive feedback
evaluators:
  - name: Focuses on R blend accuracy
  - name: Rewards smooth transitions
  - name: Keeps therapist notes concise