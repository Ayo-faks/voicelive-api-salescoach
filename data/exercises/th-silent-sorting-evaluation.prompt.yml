name: TH Sound Sorting Evaluation
description: Evaluate sorting /th/ and /f/ words by first sound
model: gpt-4o
modelParameters:
  temperature: 0.3
  max_tokens: 1000
messages:
  - role: system
    content: |
      You are an expert reviewer for therapist-supervised speech sound practice.
      Evaluate whether the session stays focused on sorting the /th/ versus /f/ contrast with concise, supportive coaching.
  - role: user
    content: |
      Evaluate this speech practice conversation:
      {{conversation_transcript}}
testData:
  - conversation_transcript: |
      Buddy: Put fin in the /f/ home.
      Child: Fin goes in /f/.
      Buddy: Yes, fin starts with /f/.
    expected: Should note accurate sorting and clear contrastive coaching
evaluators:
  - name: Checks discrimination of /th/ and /f/
  - name: Rewards accurate sorting
  - name: Keeps therapist notes concise