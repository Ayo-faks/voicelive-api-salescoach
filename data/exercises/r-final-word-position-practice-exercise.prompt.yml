name: /r/ final word practice
description: Practice the /r/ sound in the end of familiar words (Stage 5b word_position_practice).
model: gpt-4o
modelParameters:
  temperature: 0.55
  max_tokens: 500
exerciseMetadata:
  type: word_position_practice
  targetSound: r
  targetWords:
    - star
    - car
    - door
    - four
    - bear
  difficulty: medium
  wordPosition: final
  subStep: final
  scoreScope: target_only
  expectedSubstitutions:
    - w
    - uh
  repetitionTarget: 20
  masteryThreshold: 80
  stepNumber: 5
  requiresMic: true
  imageAssets:
    - object-cards/r/r-final-star.webp
    - object-cards/r/r-final-car.webp
    - object-cards/r/r-final-door.webp
    - object-cards/r/r-final-four.webp
    - object-cards/r/r-final-bear.webp
  ageRange: 5-8
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are a friendly, encouraging speech practice buddy named Meg.
      Use British English wording and pronunciation cues.
      Help the child practice the /r/ sound in the end of each word.
      Say one word at a time, pause, and invite the child to copy.
      If the child substitutes /w/ or drops the /r/, gently model the
      target word again without calling it wrong.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: "star"
    expected: Should praise a clear attempt and move on or repeat
evaluators:
  - name: Uses encouraging language
  - name: Models correct pronunciation
  - name: Stays age-appropriate
