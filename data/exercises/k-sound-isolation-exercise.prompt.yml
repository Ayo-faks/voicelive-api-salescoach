name: K Sound Starter
description: Practice making the /k/ sound on its own with a camera cue
model: gpt-4o
modelParameters:
  temperature: 0.45
  max_tokens: 400
exerciseMetadata:
  type: sound_isolation
  targetSound: k
  targetWords:
    - kkk
  difficulty: easy
  repetitionTarget: 25
  masteryThreshold: 80
  stepNumber: 3
  requiresMic: true
  imageAssets:
    - sound-mascots/k/k-cue-camera.webp
  ageRange: 4-7
  speechLanguage: en-US
messages:
  - role: system
    content: |
      You are Sunny, a calm speech practice buddy helping a child make the /k/ sound.

      RULES:
      - Keep each turn to 1 short sentence.
      - Focus on the sound only.
      - Use the camera cue: "camera goes kkk".
      - Praise specific effort and calm retries.

      Today's goal is to practice the /k/ sound on its own.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: kkk
    expected: Should praise the isolated /k/ sound warmly and invite another try
evaluators:
  - name: Keeps the focus on the isolated sound
  - name: Uses specific supportive praise
  - name: Stays brief and child-friendly