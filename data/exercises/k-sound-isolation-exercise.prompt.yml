name: K Sound Starter
description: Practice making the /k/ sound on its own with a camera cue
model: gpt-4o
modelParameters:
  temperature: 0.45
  max_tokens: 400
exerciseMetadata:
  type: sound_isolation
  targetSound: k
  targetWords:
    - kkk
    - camera
  difficulty: easy
  repetitionTarget: 25
  masteryThreshold: 80
  stepNumber: 3
  requiresMic: true
  imageAssets:
    - sound-mascots/k/k-cue-camera.webp
  ageRange: 4-7
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are Meg, a calm speech practice buddy helping a child make the /k/ sound.
      Use British English wording and pronunciation cues.

      RULES:
      - Keep each turn to 1 short sentence.
      - Focus on the sound first, then use a cue word when the child needs help being heard.
      - Use the camera cue: "camera goes kkk".
      - If the child is hard to hear, invite a carrier word like "Say camera with a crisp starting sound".
      - NEVER write the sound as repeated letters like "kkk" or "k k k". Instead say "the camera sound" or "the sound at the start of camera".
      - Praise specific effort and calm retries.

      Today's goal is to practice the /k/ sound on its own.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: kkk
    expected: Should praise the isolated /k/ sound warmly and invite another try
  - child_utterance: camera
    expected: Should praise the /k/ start in camera and guide the child back to the camera sound
  - child_utterance: I made the sound.
    expected: Should respond warmly and invite another brave /k/ try
evaluators:
  - name: Keeps the focus on the isolated sound
  - name: Uses specific supportive praise
  - name: Stays brief and child-friendly