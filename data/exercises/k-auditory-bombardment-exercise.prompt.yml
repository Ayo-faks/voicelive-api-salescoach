name: /k/ — Auditory Bombardment
description: Twelve camera-sound pictures play automatically while the child listens.
model: gpt-4o
modelParameters:
  temperature: 0.2
  max_tokens: 120
exerciseMetadata:
  type: auditory_bombardment
  targetSound: k
  targetWords:
    - kite
    - key
    - cat
    - cup
    - cake
    - cow
    - coat
    - king
    - duck
    - book
    - rock
    - clock
  difficulty: easy
  repetitionTarget: 20
  masteryThreshold: null
  stepNumber: 0
  requiresMic: false
  durationSeconds: 90
  imageAssets:
    - object-cards/k/k-initial-kite.webp
    - object-cards/k/k-initial-key.webp
    - object-cards/k/k-initial-cat.webp
    - object-cards/k/k-initial-cup.webp
    - object-cards/k/k-initial-cake.webp
    - object-cards/k/k-initial-cow.webp
    - object-cards/k/k-initial-coat.webp
    - object-cards/k/k-initial-king.webp
    - object-cards/k/k-final-duck.webp
    - object-cards/k/k-final-book.webp
    - object-cards/k/k-final-rock.webp
    - object-cards/k/k-final-clock.webp
  ageRange: 5-8
  speechLanguage: en-GB
  exemplars:
    - word: kite
      imageAssetId: k-initial-kite
      audioSource: tts
      position: initial
    - word: key
      imageAssetId: k-initial-key
      audioSource: tts
      position: initial
    - word: cat
      imageAssetId: k-initial-cat
      audioSource: tts
      position: initial
    - word: cup
      imageAssetId: k-initial-cup
      audioSource: tts
      position: initial
    - word: cake
      imageAssetId: k-initial-cake
      audioSource: tts
      position: initial
    - word: cow
      imageAssetId: k-initial-cow
      audioSource: tts
      position: initial
    - word: coat
      imageAssetId: k-initial-coat
      audioSource: tts
      position: initial
    - word: king
      imageAssetId: k-initial-king
      audioSource: tts
      position: initial
    - word: duck
      imageAssetId: k-final-duck
      audioSource: tts
      position: final
    - word: book
      imageAssetId: k-final-book
      audioSource: tts
      position: final
    - word: rock
      imageAssetId: k-final-rock
      audioSource: tts
      position: final
    - word: clock
      imageAssetId: k-final-clock
      audioSource: tts
      position: final
messages:
  - role: system
    content: |
      You are Meg, a calm speech practice buddy. This is a listening-only Stage 0 activity: the app plays twelve camera-sound picture words automatically.
      Stay silent during the run. If the child speaks, reply with one short warm sentence and let the pictures keep going.
      Never say the letter names. If you must name the sound, use the percept label "kuh".
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: I can hear the pictures
    expected: Warm one-sentence acknowledgement, no instruction to repeat
evaluators:
  - name: Stays quiet and warm during listening
  - name: Never spells out letter names
  - name: Uses the kuh percept label when naming the sound
