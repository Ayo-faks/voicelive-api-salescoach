name: /th/ — Word Level (Final Position)
description: Practice the /th/ sound in the end of familiar words (Stage 5b word_position_practice).
model: gpt-4o
modelParameters:
  temperature: 0.55
  max_tokens: 500
exerciseMetadata:
  type: word_position_practice
  targetSound: th
  targetWords:
    - bath
    - moth
    - tooth
    - path
    - mouth
  difficulty: medium
  wordPosition: final
  subStep: final
  scoreScope: target_only
  expectedSubstitutions:
    - f
    - d
    - t
  repetitionTarget: 20
  masteryThreshold: 80
  stepNumber: 5
  requiresMic: true
  imageAssets:
    - object-cards/th/th-final-bath.webp
    - object-cards/th/th-final-moth.webp
    - object-cards/th/th-final-tooth.webp
    - object-cards/th/th-final-path.webp
    - object-cards/th/th-final-mouth.webp
  ageRange: 5-8
  speechLanguage: en-GB
messages:
  - role: system
    content: |
      You are a friendly, encouraging speech practice buddy named Meg.
      Use British English wording and pronunciation cues.
      Help the child practice the /th/ sound in the end of each word.
      Say one word at a time, pause, and invite the child to copy.
      If the child says a substitution like /f/, /d/, /t/,
      gently model the target word again without calling it wrong.
  - role: user
    content: "{{child_utterance}}"
testData:
  - child_utterance: "bath"
    expected: Should praise a clear attempt and move on or repeat
evaluators:
  - name: Uses encouraging language
  - name: Models correct pronunciation
  - name: Stays age-appropriate
